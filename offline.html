<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Offline | IELTS Tracker</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: rgba(255,255,255,.1);
      --text: #f0f4ff;
      --muted: rgba(240,244,255,.65);
      --gold: #f5c842;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 10% 10%, rgba(245,200,66,.14), transparent 38%), var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      padding: 18px;
    }
    .card {
      width: min(460px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
      font-size: 14px;
    }
    .btn {
      border: 1px solid rgba(245,200,66,.45);
      background: rgba(245,200,66,.1);
      color: var(--gold);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>The app is still available. Reconnect to use online features like update checks and AI analysis.</p>
    <button class="btn" type="button" onclick="location.href='main.html'">Open Tracker</button>
  </main>
</body>
</html>
